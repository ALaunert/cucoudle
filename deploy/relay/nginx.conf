server {
    listen 80;
    listen [::]:80;
    server_name relay.launert.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name relay.launert.dev;

    ssl_certificate /etc/letsencrypt/live/launert.dev-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/launert.dev-wildcard/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8787;
        include snippets/proxy-headers.conf;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
