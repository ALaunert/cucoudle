services:
  relay:
    image: ${RELAY_IMAGE:?RELAY_IMAGE must reference an immutable relay image}
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      RELAY_MOBILE_URL: "wss://relay.launert.dev/v1/ws/mobile"
      MOBILE_SESSION_TTL_SECONDS: "28800"
      DESKTOP_RESPONSE_TIMEOUT_MS: "15000"
      RELAY_LOG_INPUT_TEXT: "true"
      RELAY_LOG_PAYLOADS: "true"
    ports:
      - "127.0.0.1:8787:8787"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
