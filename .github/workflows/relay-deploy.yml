name: Relay deploy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/relay-deploy.yml"
      - "apps/relay/**"
      - "packages/protocol/**"
      - "deploy/relay/**"
      - "Dockerfile.relay"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: relay-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/alaunert/cucoudle-relay

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  publish-and-deploy:
    needs: test
    if: ${{ vars.RELAY_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: relay-production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish immutable image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.relay
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RELAY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.RELAY_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/relay_deploy
          chmod 600 ~/.ssh/relay_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Authenticate server to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SSH_HOST: ${{ secrets.RELAY_SSH_HOST }}
          SSH_PORT: ${{ secrets.RELAY_SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.RELAY_SSH_USER }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/relay_deploy -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" "docker login ghcr.io --username '$GHCR_USERNAME' --password-stdin"

      - name: Upload deployment bundle
        env:
          SSH_HOST: ${{ secrets.RELAY_SSH_HOST }}
          SSH_PORT: ${{ secrets.RELAY_SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.RELAY_SSH_USER }}
        run: |
          tar -C deploy/relay -czf /tmp/cucoudle-relay-deploy.tgz compose.yaml deploy.sh nginx.conf
          scp -i ~/.ssh/relay_deploy -P "$SSH_PORT" /tmp/cucoudle-relay-deploy.tgz \
            "$SSH_USER@$SSH_HOST:cucoudle-relay-deploy.tgz"
          ssh -i ~/.ssh/relay_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            'mkdir -p services/cucoudle-relay && tar -xzf cucoudle-relay-deploy.tgz -C services/cucoudle-relay && rm cucoudle-relay-deploy.tgz && chmod 700 services/cucoudle-relay/deploy.sh'

      - name: Deploy and verify
        env:
          RELEASE_IMAGE: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          SSH_HOST: ${{ secrets.RELAY_SSH_HOST }}
          SSH_PORT: ${{ secrets.RELAY_SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.RELAY_SSH_USER }}
        run: |
          ssh -i ~/.ssh/relay_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "services/cucoudle-relay/deploy.sh '$RELEASE_IMAGE'"
          curl --fail --retry 12 --retry-delay 5 --retry-all-errors \
            https://relay.launert.dev/readyz
